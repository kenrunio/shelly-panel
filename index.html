<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Shelly Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #000;
      --card-bg:  #0a0a0a;
      --border:   #1a1a1a;
      --label:    #aaa;
      --unit:     #777;
      --on-text:  #f0b040;
      --on-icon:  #e8a020;
      --off-text: #fff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 1px;
      background: var(--border);
      min-height: 0;
    }

    .col {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 1px;
    }

    .card {
      flex: 1;
      background: var(--card-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 8px;
      overflow: hidden;
      position: relative;
    }

    .card-icon   { color: #ccc; flex-shrink: 0; }
    .card-label  { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--label); text-align: center; }
    .card-unit   { font-size: 18px; font-weight: 300; color: var(--unit); }
    .card-sub    { font-size: 11px; color: var(--label); }

    .value-row   { display: flex; align-items: baseline; gap: 3px; line-height: 1; }
    .card-value  { font-size: 64px; font-weight: 100; letter-spacing: -3px; }
    .card-value.md { font-size: 48px; letter-spacing: -2px; }

    /* Boiler states */
    .state-on  .card-value { color: var(--on-text); }
    .state-on  .card-icon  { color: var(--on-icon); }
    .state-off .card-value { color: var(--off-text); }

    /* Weather card */
    .weather-icon { color: #fff; }
    .weather-city { font-size: 13px; font-weight: 500; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
    .weather-desc { font-size: 10px; color: #888; letter-spacing: 0.5px; text-transform: uppercase; }
    .weather-hilo {
      font-size: 15px; font-weight: 200;
      display: flex; align-items: baseline; gap: 6px;
    }
    .hilo-sep  { color: #333; }
    .range-min { color: #4a9eff; }
    .range-max { color: #ff6b4a; }
    .sun-row  { display: flex; width: 100%; justify-content: space-around; }
    .sun-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sun-time { font-size: 40px; font-weight: 100; letter-spacing: -2px; }
    #moon-svg { display: block; flex-shrink: 0; }
    /* Pin sub-labels to the bottom so they don't shift values upward */
    #card-weather-cur .weather-hilo { position: absolute; bottom: 10px; }
    #card-boiler      .card-sub     { position: absolute; bottom: 10px; }
    .hebrew-date    { font-size: 13px; font-weight: 500; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; text-align: center; }
    .jewish-holiday { font-size: 10px; color: #888; letter-spacing: 0.5px; text-transform: uppercase; text-align: center; }
    /* Moon card: date/holiday pinned to bottom, label+SVG flex-center as a group */
    #card-weather-info #hebrew-date    { position: absolute; bottom: 22px; }
    #card-weather-info .jewish-holiday { position: absolute; bottom: 7px; }
    /* Stacked sun times card */
    #card-sun-times { gap: 10px; }
    /* Pin city/desc to the bottom so the weather icon alone flex-centers */
    #card-weather-icon .weather-city { position: absolute; bottom: 22px; }
    #card-weather-icon .weather-desc { position: absolute; bottom: 8px; }

    /* Portrait: 4 rows × 2 cards */
    @media (orientation: portrait) {
      .panel { flex-direction: column; }
      .col   { flex-direction: row; }
      #weather-svg { width: 66px; height: 66px; }
      #moon-svg    { width: 60px; height: 60px; }
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 14px 6px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .dots { display: flex; gap: 6px; align-items: center; }
    .dot  { width: 6px; height: 6px; border-radius: 50%; background: #222; transition: background 0.4s; }
    .dot.online { background: #27ae60; }
    .dot.error  { background: #c0392b; }
    .last-update { font-size: 10px; color: #2a2a2a; }
  </style>
</head>
<body>

<div class="panel">

  <!-- ── LEFT COLUMN: temperatures ── -->
  <div class="col">

    <div class="card" id="card-water">
      <svg class="card-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
      </svg>
      <div class="card-label">Water</div>
      <div class="value-row">
        <div class="card-value" id="water-temp">—</div>
        <div class="card-unit">°C</div>
      </div>
    </div>

    <div class="card" id="card-air">
      <svg class="card-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
      </svg>
      <div class="card-label">Air</div>
      <div class="value-row">
        <div class="card-value" id="air-temp">—</div>
        <div class="card-unit">°C</div>
      </div>
    </div>

  </div>

  <!-- ── MIDDLE COLUMN: boiler + power ── -->
  <div class="col">

    <div class="card" id="card-boiler">
      <svg class="card-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <div class="card-label" id="boiler-label">Boiler</div>
      <div class="value-row">
        <div class="card-value" id="boiler-value">—</div>
      </div>
      <div class="card-sub" id="boiler-sub"></div>
    </div>

    <div class="card" id="card-power">
      <svg class="card-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <div class="card-label">Power</div>
      <div class="value-row">
        <div class="card-value" id="power-value">—</div>
        <div class="card-unit">kW</div>
      </div>
    </div>

  </div>

  <!-- ── COL 3: weather icon + sun/moon ── -->
  <div class="col">

    <div class="card" id="card-weather-icon">
      <div class="card-label">Today's Forecast</div>
      <svg class="weather-icon" id="weather-svg" width="90" height="90" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- filled by JS -->
      </svg>
      <div class="weather-city" id="weather-city">—</div>
      <div class="weather-desc" id="weather-desc">—</div>
    </div>

    <div class="card" id="card-weather-cur">
      <svg class="card-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
      </svg>
      <div class="card-label">Temperature</div>
      <div class="value-row">
        <div class="card-value" id="weather-cur">—</div>
        <div class="card-unit">°C</div>
      </div>
      <div class="weather-hilo">
        <span class="range-min" id="weather-min">—</span>
        <span class="hilo-sep">-</span>
        <span class="range-max" id="weather-max">—</span>
      </div>
    </div>

  </div>

  <!-- ── COL 4: moon (top) + sun times (bottom) ── -->
  <div class="col">

    <div class="card" id="card-weather-info">
      <div class="card-label" id="moon-name">—</div>
      <svg id="moon-svg" width="90" height="90" viewBox="0 0 80 80"></svg>
      <div class="hebrew-date" id="hebrew-date"></div>
      <div class="jewish-holiday" id="jewish-holiday"></div>
    </div>

    <div class="card" id="card-sun-times">
      <div class="sun-item">
        <svg class="card-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 15 A7 7 0 0 1 19 15"/>
          <line x1="2" y1="15" x2="22" y2="15"/>
          <line x1="12" y1="3" x2="12" y2="6"/>
          <line x1="19.2" y1="6.8" x2="17.1" y2="8.5"/>
          <line x1="4.8" y1="6.8" x2="6.9" y2="8.5"/>
        </svg>
        <div class="card-label">Sunrise</div>
        <div class="sun-time" id="weather-sunrise">—</div>
      </div>
      <div class="sun-item">
        <div class="card-label">Sunset</div>
        <div class="sun-time" id="weather-sunset">—</div>
      </div>
    </div>

  </div>

</div>

<!-- ── Status bar ── -->
<div class="status-bar">
  <div class="dots">
    <div class="dot" id="dot-87"></div>
    <div class="dot" id="dot-76"></div>
    <div class="dot" id="dot-77"></div>
    <div class="dot" id="dot-wx"></div>
    <div class="dot" id="dot-hc"></div>
  </div>
  <div class="last-update" id="last-update"></div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const DEVICES = {
    temp:    '192.168.68.87',
    boiler1: '192.168.68.76',
    boiler2: '192.168.68.77',
  };
  const AUTO_OFF_DELAY   = 4800;
  const SHELLY_INTERVAL  = 15000;
  const WEATHER_INTERVAL = 20 * 60 * 1000;

  const WEATHER_LAT  = 31.8969;
  const WEATHER_LON  = 35.0100;
  const WEATHER_CITY = 'Modiin';

  // ── Countdown state ─────────────────────────────────────
  let boiler1 = { remaining: null, fetchedAt: null };
  let boiler2 = { remaining: null, fetchedAt: null };

  // ── Helpers ─────────────────────────────────────────────
  function fmt(sec) {
    if (sec == null || sec < 0) sec = 0;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return m + ':' + String(s).padStart(2,'0');
  }

  function setDot(id, state) {
    document.getElementById(id).className = 'dot ' + state;
  }

  async function fetchWithTimeout(url, ms) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try {
      const r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
      if (!r.ok) throw new Error(r.status);
      return r.json();
    } finally {
      clearTimeout(t);
    }
  }

  function getShelly(ip) {
    return fetchWithTimeout('http://' + ip + '/script/1/status', 5000);
  }

  // ── Extract boiler state from switch data ────────────────
  function extractBoiler(sw, sys, state) {
    if (!sw.output) {
      state.remaining = null;
      return { on: false, remaining: null };
    }
    const duration = sw.timer_duration ?? AUTO_OFF_DELAY;
    if (sw.timer_started_at) {
      const remaining = Math.max(0, (sw.timer_started_at + duration) - sys.unixtime);
      state.remaining = remaining;
      state.fetchedAt = Date.now() / 1000;
      return { on: true, remaining };
    }
    state.remaining = null;
    return { on: true, remaining: null };
  }

  // ── Update combined boiler card ──────────────────────────
  function updateBoilerCard(b1, b2) {
    const card   = document.getElementById('card-boiler');
    const valEl  = document.getElementById('boiler-value');
    const lblEl  = document.getElementById('boiler-label');
    const subEl  = document.getElementById('boiler-sub');

    const anyOn = b1?.on || b2?.on;

    if (!anyOn) {
      card.className      = 'card state-off';
      lblEl.textContent   = 'Boiler';
      valEl.textContent   = 'OFF';
      subEl.textContent   = '';
      return;
    }

    card.className = 'card state-on';

    if (b1?.on && b2?.on)       lblEl.textContent = 'Boiler & Backup';
    else if (b1?.on)            lblEl.textContent = 'Boiler';
    else                        lblEl.textContent = 'Backup';

    // Pick the larger remaining time
    const r1 = b1?.on ? (b1.remaining ?? null) : null;
    const r2 = b2?.on ? (b2.remaining ?? null) : null;
    const best = (r1 != null && r2 != null) ? Math.max(r1, r2)
               : (r1 != null) ? r1
               : (r2 != null) ? r2
               : null;

    if (best != null) {
      valEl.textContent = fmt(best);
      subEl.textContent = 'remaining';
    } else {
      valEl.textContent = 'ON';
      subEl.textContent = '';
    }
  }

  // ── Shelly poll ──────────────────────────────────────────
  async function pollShelly() {
    const [r87, r76, r77] = await Promise.allSettled([
      getShelly(DEVICES.temp),
      getShelly(DEVICES.boiler1),
      getShelly(DEVICES.boiler2),
    ]);

    // Temperature
    if (r87.status === 'fulfilled') {
      const d = r87.value;
      const w = d['temperature:100']?.tC;
      const a = d['temperature:101']?.tC;
      document.getElementById('water-temp').textContent = w != null ? w.toFixed(1) : '—';
      document.getElementById('air-temp').textContent   = a != null ? a.toFixed(1) : '—';
      setDot('dot-87', 'online');
    } else {
      document.getElementById('water-temp').textContent = '—';
      document.getElementById('air-temp').textContent   = '—';
      setDot('dot-87', 'error');
    }

    // Boilers
    const b1 = r76.status === 'fulfilled'
      ? extractBoiler(r76.value['switch:0'], r76.value.sys, boiler1)
      : null;
    const b2 = r77.status === 'fulfilled'
      ? extractBoiler(r77.value['switch:0'], r77.value.sys, boiler2)
      : null;

    if (r76.status === 'fulfilled') setDot('dot-76', 'online'); else { boiler1.remaining = null; setDot('dot-76', 'error'); }
    if (r77.status === 'fulfilled') setDot('dot-77', 'online'); else { boiler2.remaining = null; setDot('dot-77', 'error'); }

    updateBoilerCard(b1, b2);

    // Power
    const power = (r76.status === 'fulfilled' ? (r76.value['switch:0'].apower ?? 0) : 0)
                + (r77.status === 'fulfilled' ? (r77.value['switch:0'].apower ?? 0) : 0);
    const pEl   = document.getElementById('power-value');
    const pCard = document.getElementById('card-power');
    pEl.textContent = (power / 1000).toFixed(1);
    pCard.className = power > 10 ? 'card state-on' : 'card';

    document.getElementById('last-update').textContent =
      new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  // ── Live countdown tick ──────────────────────────────────
  function tick() {
    const now = Date.now() / 1000;
    const card  = document.getElementById('card-boiler');
    if (!card.classList.contains('state-on')) return;

    const r1 = (boiler1.remaining != null && boiler1.fetchedAt != null)
      ? Math.max(0, boiler1.remaining - (now - boiler1.fetchedAt)) : null;
    const r2 = (boiler2.remaining != null && boiler2.fetchedAt != null)
      ? Math.max(0, boiler2.remaining - (now - boiler2.fetchedAt)) : null;

    const best = (r1 != null && r2 != null) ? Math.max(r1, r2)
               : (r1 != null) ? r1
               : (r2 != null) ? r2
               : null;

    if (best != null) {
      document.getElementById('boiler-value').textContent = fmt(best);
      if (best === 0) {
        document.getElementById('card-boiler').className = 'card state-off';
        document.getElementById('boiler-sub').textContent = '';
      }
    }
  }

  // ── Weather ──────────────────────────────────────────────
  const WMO = {
    0:  ['Clear',        'sunny'],
    1:  ['Mainly Clear', 'partly'],
    2:  ['Partly Cloudy','partly'],
    3:  ['Overcast',     'cloudy'],
    45: ['Fog',          'fog'],
    48: ['Fog',          'fog'],
    51: ['Light Drizzle','rain'],
    53: ['Drizzle',      'rain'],
    55: ['Drizzle',      'rain'],
    61: ['Light Rain',   'rain'],
    63: ['Rain',         'rain'],
    65: ['Heavy Rain',   'rain'],
    71: ['Light Snow',   'snow'],
    73: ['Snow',         'snow'],
    75: ['Heavy Snow',   'snow'],
    80: ['Showers',      'rain'],
    81: ['Showers',      'rain'],
    82: ['Heavy Showers','rain'],
    95: ['Thunderstorm', 'storm'],
    96: ['Thunderstorm', 'storm'],
    99: ['Thunderstorm', 'storm'],
  };

  function wmoLookup(code) {
    return WMO[code] ?? WMO[Math.floor(code / 10) * 10] ?? ['—', 'cloudy'];
  }

  const WEATHER_ICONS = {
    sunny: `
      <circle cx="32" cy="32" r="12" stroke-width="2"/>
      <line x1="32" y1="6"  x2="32" y2="12"/>
      <line x1="32" y1="52" x2="32" y2="58"/>
      <line x1="6"  y1="32" x2="12" y2="32"/>
      <line x1="52" y1="32" x2="58" y2="32"/>
      <line x1="13.5" y1="13.5" x2="17.7" y2="17.7"/>
      <line x1="46.3" y1="46.3" x2="50.5" y2="50.5"/>
      <line x1="50.5" y1="13.5" x2="46.3" y2="17.7"/>
      <line x1="17.7" y1="46.3" x2="13.5" y2="50.5"/>`,
    partly: `
      <circle cx="24" cy="22" r="9" stroke-width="2"/>
      <line x1="24" y1="8"  x2="24" y2="13"/>
      <line x1="24" y1="31" x2="24" y2="36" opacity="0.4"/>
      <line x1="10" y1="22" x2="15" y2="22"/>
      <line x1="33" y1="22" x2="38" y2="22"/>
      <line x1="13.5" y1="11.5" x2="17" y2="15"/>
      <line x1="31" y1="29" x2="34.5" y2="32.5" opacity="0.4"/>
      <line x1="34.5" y1="11.5" x2="31" y2="15"/>
      <path d="M22 38 Q22 32 28 32 Q30 26 37 27 Q44 27 44 34 Q49 34 49 40 Q49 46 43 46 L24 46 Q17 46 17 40 Q17 37 22 38Z"/>`,
    cloudy: `
      <path d="M16 42 Q16 34 24 34 Q26 26 35 27 Q46 27 46 36 Q52 36 52 43 Q52 50 45 50 L20 50 Q12 50 12 43 Q12 40 16 42Z"/>`,
    fog: `
      <path d="M14 28 Q14 20 22 20 Q24 14 32 15 Q42 15 42 23 Q47 23 47 29" fill="none"/>
      <line x1="10" y1="38" x2="54" y2="38"/>
      <line x1="14" y1="46" x2="50" y2="46"/>
      <line x1="18" y1="54" x2="46" y2="54"/>`,
    rain: `
      <path d="M16 32 Q16 24 24 24 Q26 16 35 17 Q46 17 46 26 Q52 26 52 33 Q52 40 45 40 L20 40 Q12 40 12 33 Q12 30 16 32Z"/>
      <line x1="22" y1="46" x2="20" y2="54"/>
      <line x1="32" y1="46" x2="30" y2="54"/>
      <line x1="42" y1="46" x2="40" y2="54"/>`,
    snow: `
      <path d="M16 30 Q16 22 24 22 Q26 14 35 15 Q46 15 46 24 Q52 24 52 31 Q52 38 45 38 L20 38 Q12 38 12 31 Q12 28 16 30Z"/>
      <circle cx="22" cy="50" r="2.5" fill="currentColor" stroke="none"/>
      <circle cx="32" cy="50" r="2.5" fill="currentColor" stroke="none"/>
      <circle cx="42" cy="50" r="2.5" fill="currentColor" stroke="none"/>
      <circle cx="27" cy="58" r="2.5" fill="currentColor" stroke="none"/>
      <circle cx="37" cy="58" r="2.5" fill="currentColor" stroke="none"/>`,
    storm: `
      <path d="M16 28 Q16 20 24 20 Q26 12 35 13 Q46 13 46 22 Q52 22 52 29 Q52 36 45 36 L20 36 Q12 36 12 29 Q12 26 16 28Z"/>
      <polyline points="36,38 28,50 34,50 26,62"/>`,
  };

  function getMoonPhase() {
    const knownNew = new Date('2000-01-06T18:14:00Z');
    const period   = 29.53058867;
    const age = (((Date.now() - knownNew) / 86400000) % period + period) % period;
    let name;
    if (age <  1.85) name = 'New';
    else if (age <  7.38) name = 'Waxing Crescent';
    else if (age <  9.22) name = 'First Quarter';
    else if (age < 14.77) name = 'Waxing Gibbous';
    else if (age < 16.61) name = 'Full';
    else if (age < 22.15) name = 'Waning Gibbous';
    else if (age < 23.99) name = 'Last Quarter';
    else name = 'Waning Crescent';
    return [age, name];
  }

  function drawMoonSVG(age) {
    const R = 32, cx = 40, cy = 40;
    const period = 29.53058867;
    const k = (1 - Math.cos(2 * Math.PI * age / period)) / 2;
    const waxing = age < period / 2;
    const tx = +(Math.abs(R * Math.cos(Math.PI * k))).toFixed(3);
    // Tiny x-offsets break SVG antipodal-arc ambiguity (same-X start/end = undefined behaviour)
    const xa = cx - 0.01, xb = cx + 0.01;

    let litPath;
    if (k > 0.94) {
      litPath = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="#e8e8e8"/>`;
    } else if (k < 0.03) {
      litPath = '';
    } else if (waxing) {
      const sweep = k < 0.5 ? 0 : 1;
      litPath = `<path d="M${xa} ${cy-R} A${R} ${R} 0 1 1 ${xb} ${cy+R} A${tx} ${R} 0 0 ${sweep} ${xa} ${cy-R}Z" fill="#e8e8e8"/>`;
    } else {
      const sweep = k < 0.5 ? 1 : 0;
      litPath = `<path d="M${xb} ${cy-R} A${R} ${R} 0 1 0 ${xa} ${cy+R} A${tx} ${R} 0 0 ${sweep} ${xb} ${cy-R}Z" fill="#e8e8e8"/>`;
    }

    document.getElementById('moon-svg').innerHTML =
      `<circle cx="${cx}" cy="${cy}" r="${R}" fill="#0d0d0d" stroke="#333" stroke-width="1"/>` + litPath;
  }

  const WEATHER_COLORS = {
    sunny:  '#f0c040',   // warm yellow
    partly: '#c8a830',   // dimmer yellow (sun behind cloud)
    cloudy: '#cccccc',   // white/grey
    fog:    '#888888',   // muted grey
    rain:   '#4a9eff',   // blue
    snow:   '#a8d8ff',   // icy light blue
    storm:  '#e04040',   // red (danger)
  };

  function setWeatherIcon(type) {
    const svg = document.getElementById('weather-svg');
    svg.innerHTML = WEATHER_ICONS[type] ?? WEATHER_ICONS.cloudy;
    svg.style.color = WEATHER_COLORS[type] ?? '#cccccc';
  }

  async function fetchHebrewDate() {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
    const today = y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const convUrl = 'https://www.hebcal.com/converter?cfg=json&gy=' + y + '&gm=' + m + '&gd=' + d + '&g2h=1';
    const calUrl  = 'https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=on&nx=on&mf=on&ss=on&i=off&year=' + y + '&month=' + m;
    try {
      const [convRes, calRes] = await Promise.allSettled([
        fetchWithTimeout(convUrl, 8000),
        fetchWithTimeout(calUrl,  8000),
      ]);
      if (convRes.status === 'fulfilled' && convRes.value.hd)
        document.getElementById('hebrew-date').textContent =
          convRes.value.hd + ' ' + convRes.value.hm + ' ' + convRes.value.hy;
      const holEl = document.getElementById('jewish-holiday');
      if (calRes.status === 'fulfilled' && calRes.value.items) {
        const hit = calRes.value.items.find(e => e.date === today &&
          ['holiday','roshchodesh','specialShabbat'].includes(e.category));
        holEl.textContent = hit ? hit.title : '';
      } else {
        holEl.textContent = '';
      }
      setDot('dot-hc', convRes.status === 'fulfilled' ? 'online' : 'error');
    } catch {
      setDot('dot-hc', 'error');
    }
  }

  async function pollWeather() {
    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude='  + WEATHER_LAT
      + '&longitude=' + WEATHER_LON
      + '&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset'
      + '&current=temperature_2m,weathercode'
      + '&timezone=Asia%2FJerusalem&forecast_days=1';
    try {
      const d = await fetchWithTimeout(url, 8000);
      const code   = d.daily.weathercode[0];
      const tmax   = d.daily.temperature_2m_max[0];
      const tmin   = d.daily.temperature_2m_min[0];
      const tcur   = d.current?.temperature_2m;
      const sunrise = d.daily.sunrise[0]?.split('T')[1] ?? '—';
      const sunset  = d.daily.sunset[0]?.split('T')[1]  ?? '—';
      const [desc, icon] = wmoLookup(code);
      setWeatherIcon(icon);
      document.getElementById('weather-city').textContent = WEATHER_CITY;
      document.getElementById('weather-desc').textContent = desc;
      document.getElementById('weather-cur').textContent  = tcur != null ? Math.round(tcur) : '—';
      document.getElementById('weather-min').textContent  = Math.round(tmin) + '°';
      document.getElementById('weather-max').textContent  = Math.round(tmax) + '°';
      document.getElementById('weather-sunrise').textContent = sunrise;
      document.getElementById('weather-sunset').textContent  = sunset;
      const [moonAge, moonName] = getMoonPhase();
      document.getElementById('moon-name').textContent = moonName + ' Moon';
      drawMoonSVG(moonAge);
      setDot('dot-wx', 'online');
    } catch {
      setDot('dot-wx', 'error');
    }
  }

  // ── Start ────────────────────────────────────────────────
  const [initMoonAge, initMoonName] = getMoonPhase();
  document.getElementById('moon-name').textContent = initMoonName + ' Moon';
  drawMoonSVG(initMoonAge);
  pollShelly();
  pollWeather();
  fetchHebrewDate();
  setInterval(pollShelly,   SHELLY_INTERVAL);
  setInterval(pollWeather,  WEATHER_INTERVAL);
  setInterval(fetchHebrewDate, WEATHER_INTERVAL); // re-check after sunset
  setInterval(tick, 1000);
</script>
</body>
</html>
